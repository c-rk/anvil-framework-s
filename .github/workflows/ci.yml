name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev + server)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: Lint (ruff, correctness gate)
        run: ruff check src anvil_server tests

      - name: Run test suite
        run: pytest tests -q

  smoke-one-command:
    name: one-command start smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Exercises the exact fresh-clone path a new user takes: a single command
      # that provisions a venv, installs, boots the server, and is reachable.
      # The window is generous because a cold `pip install` runs inside it.
      - name: Bootstrap via start_anvil.py (no browser)
        run: |
          python start_anvil.py --port 8123 --no-browser &
          BOOT_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:8123/healthz >/dev/null; then
              echo "server is up:"
              curl -s http://127.0.0.1:8123/healthz
              kill $BOOT_PID 2>/dev/null || true
              exit 0
            fi
            if ! kill -0 $BOOT_PID 2>/dev/null; then
              echo "start_anvil.py exited before the server came up"
              exit 1
            fi
            sleep 4
          done
          echo "server did not come up within the timeout"
          kill $BOOT_PID 2>/dev/null || true
          exit 1
